<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나의 학습 기록</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    text-align: center;
    padding: 30px;
}

.container {
    max-width: 500px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

input, button {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: none;
}

button {
    background: #38bdf8;
    color: black;
    cursor: pointer;
}

ul {
    text-align: left;
}

.progress {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

    <h1>📘 학습 & 습관 기록</h1>

    <!-- 날짜 -->
    <div class="card">
        <input type="date" id="date">
    </div>

    <!-- 할 일 -->
    <div class="card">
        <h3>✅ 오늘 할 일</h3>
        <input type="text" id="todoInput" placeholder="할 일 입력">
        <button onclick="addTodo()">추가</button>
        <ul id="todoList"></ul>
    </div>

    <!-- 습관 -->
    <div class="card">
        <h3>🔥 습관 체크</h3>
        <label><input type="checkbox" class="habit"> 코딩 공부</label><br>
        <label><input type="checkbox" class="habit"> 운동</label><br>
        <label><input type="checkbox" class="habit"> 복습</label><br>

        <div class="progress">
            달성률: <span id="rate">0%</span>
        </div>
    </div>

    <!-- 공부 시간 -->
    <div class="card">
        <h3>⏱ 공부 시간 (시간)</h3>
        <input type="number" id="studyTime">
        <button onclick="saveStudy()">저장</button>
    </div>

    <!-- 그래프 -->
    <div class="card">
        <h3>📊 공부 시간 그래프</h3>
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
let todos = JSON.parse(localStorage.getItem("todos")) || {};
let studyData = JSON.parse(localStorage.getItem("study")) || {};

function getDate() {
    return document.getElementById("date").value;
}

// 할 일 추가
function addTodo() {
    const date = getDate();
    const input = document.getElementById("todoInput");

    if (!todos[date]) todos[date] = [];
    todos[date].push({text: input.value, done: false});

    input.value = "";
    saveTodos();
    renderTodos();
}

function saveTodos() {
    localStorage.setItem("todos", JSON.stringify(todos));
}

// 할 일 표시
function renderTodos() {
    const date = getDate();
    const list = document.getElementById("todoList");
    list.innerHTML = "";

    if (!todos[date]) return;

    todos[date].forEach((todo, i) => {
        const li = document.createElement("li");
        li.innerHTML = `
            <input type="checkbox" ${todo.done ? "checked":""}
            onchange="toggleTodo(${i})">
            ${todo.text}
        `;
        list.appendChild(li);
    });
}

function toggleTodo(i) {
    const date = getDate();
    todos[date][i].done = !todos[date][i].done;
    saveTodos();
}

// 습관 달성률
document.querySelectorAll(".habit").forEach(cb => {
    cb.addEventListener("change", () => {
        const habits = document.querySelectorAll(".habit");
        let checked = 0;

        habits.forEach(h => { if (h.checked) checked++; });

        let rate = Math.round((checked / habits.length) * 100);
        document.getElementById("rate").innerText = rate + "%";
    });
});

// 공부 시간 저장
function saveStudy() {
    const date = getDate();
    const time = document.getElementById("studyTime").value;

    studyData[date] = time;
    localStorage.setItem("study", JSON.stringify(studyData));

    drawChart();
}

// 그래프
let chart;

function drawChart() {
    const ctx = document.getElementById("chart");

    const labels = Object.keys(studyData);
    const data = Object.values(studyData);

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "공부 시간",
                data: data,
                fill: false,
                tension: 0.3
            }]
        }
    });
}

// 날짜 변경 시
document.getElementById("date").addEventListener("change", () => {
    renderTodos();
});

// 초기 실행
drawChart();
</script>

</body>
</html>
