<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>고재윤 소개 페이지</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            text-align: center;
            padding: 50px;
        }

        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 380px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            color: #38bdf8;
        }

        p {
            font-size: 16px;
            margin: 10px 0;
            line-height: 1.5;
        }

        .intro {
            margin-top: 20px;
            padding: 15px;
            background-color: #334155;
            border-radius: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>👨‍💻 고재윤</h1>
        <p>📚 1학년 5반 2번</p>

        <div class="intro">
            <p><strong>자기소개</strong></p>
            <p>
                중학교 1학년 때부터 컴퓨터 코딩에 관심을 가지게 되었습니다.<br>
                중학교 3학년 때는 잠시 공백기간이 있었지만,<br>
                현재 판교고등학교에 입학하면서 다시 코딩 공부를 시작했습니다.<br>
                현재는 Python과 C언어를 독학하며 실력을 키우고 있습니다.
            </p>
        </div>

        <p style="margin-top:20px;">🚀 GitHub에 오신 것을 환영합니다!</p>
    </div>

</body>
</html>
