<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>고재윤 소개 페이지</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            text-align: center;
            padding: 50px;
        }

        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            color: #38bdf8;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }

        .goal {
            margin-top: 20px;
            padding: 10px;
            background-color: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>👨‍💻 고재윤</h1>
        <p>📚 1학년 5반 2번</p>

        <div class="goal">
            <p>🎯 목표</p>
            <p>컴퓨터 보안 전문가가 되는 것</p>
        </div>

        <p style="margin-top:20px;">🚀 GitHub에 오신 것을 환영합니다!</p>
    </div>

</body>
</html>
